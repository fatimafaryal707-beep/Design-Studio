<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Make window.fetch fully writable and configurable so platform/third-party scripts can wrap it cleanly
      (function() {
        var currentFetch = window.fetch;
        if (currentFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.error('Failed to make window.fetch writable via getter/setter:', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
